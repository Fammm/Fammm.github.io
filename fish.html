<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号安全核验通知</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f7fa;font-family:微软雅黑;}
        .box{width:420px;margin:80px auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 0 15px #eee;}
        .tip{color:#e53e3e;font-size:16px;text-align:center;margin-bottom:25px;font-weight:bold;}
        input{width:100%;height:45px;padding:0 15px;margin:12px 0;border:1px #ddd solid;border-radius:6px;font-size:15px;}
        .btn{width:100%;height:48px;background:#1677ff;color:#fff;border:none;border-radius:6px;font-size:16px;margin-top:15px;cursor:pointer;}
        .hint{font-size:13px;color:#999;text-align:center;margin-top:20px;}
    </style>
</head>
<body>
    <div class="box">
        <p class="tip">【紧急通知】账号存在异常，请立即核验解锁</p>
        <input type="text" placeholder="请输入账号">
        <input type="password" placeholder="请输入登录密码">
        <input type="text" placeholder="填写绑定手机号">
        <button class="btn">立即安全核验</button>
        <p class="hint">超时未核验账号将临时冻结</p>
    </div>

<script>
// 测试用：仅前端收集数据，本地打印，无后端上传
document.querySelector('.btn').addEventListener('click',function(){
    let user = document.querySelectorAll('input')[0].value;
    let pwd = document.querySelectorAll('input')[1].value;
    let phone = document.querySelectorAll('input')[2].value;
    console.log("测试收集数据：",{账号:user,密码:pwd,手机号:phone});
    alert("核验提交成功（SRC测试演示）");
})
</script>
</body>
</html>
